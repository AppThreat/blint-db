name: Build and Upload meson blint-db

on:
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appthreat/blintdb

jobs:
  builder-meson:
    runs-on: ['self-hosted', 'ubuntu', 'amd64']
    timeout-minutes: 7200
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
    - name: Install LLVM 18 toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm-18 llvm-18-dev clang-18 lld-18 g++ pkg-config
        echo "/usr/lib/llvm-18/bin" >> $GITHUB_PATH
        echo "NYXSTONE_LLVM_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
        echo "LLVM_CONFIG=/usr/lib/llvm-18/bin/llvm-config" >> $GITHUB_ENV
        echo "CC=clang-18" >> $GITHUB_ENV
        echo "CXX=clang++-18" >> $GITHUB_ENV
        echo "CXXFLAGS=-std=c++17" >> $GITHUB_ENV
        llvm-config --version
        curl -LO https://raw.githubusercontent.com/leleliu008/ppkg/master/ppkg
        chmod a+x ppkg
        mv ppkg /usr/local/bin/
        ppkg setup
    - name: Install dependencies
      run: |
        uv sync --upgrade --all-extras --all-groups --all-packages -p 3.13
    - name: Verify blint + disassembly dependencies
      run: |
        uv run python -c "import blint, nyxstone; print(blint.__file__)"
    - name: Clean up previous
      run: |
        rm -rf ${BLINT_DB_BOOTSTRAP_PATH}
    - name: Build and upload db
      run: |
        mkdir -p ${BLINT_DB_BOOTSTRAP_PATH}
        uv run blint-db --clean-start --disassemble --db-file ./blint.db build-meson
        uv run python .oras/orasclient.py -p meson
        uv run hf upload --quiet --repo-type dataset AppThreat/blint-db ./blint.db blintdb-meson/blint.db
        uv run hf upload --quiet --repo-type dataset AppThreat/blint-db ./blint.metadata.json blintdb-meson/blint.metadata.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}
        BLINT_DB_BOOTSTRAP_PATH: ${{ runner.temp }}/blint-db-temp
        HF_TOKEN: ${{ secrets.HF_TOKEN }}

  builder-arm64-meson:
    runs-on: ['self-hosted', 'ubuntu', 'arm64']
    timeout-minutes: 7200
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
    - name: Install LLVM 18 toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm-18 llvm-18-dev clang-18 lld-18 g++ pkg-config
        echo "/usr/lib/llvm-18/bin" >> $GITHUB_PATH
        echo "NYXSTONE_LLVM_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
        echo "LLVM_CONFIG=/usr/lib/llvm-18/bin/llvm-config" >> $GITHUB_ENV
        echo "CC=clang-18" >> $GITHUB_ENV
        echo "CXX=clang++-18" >> $GITHUB_ENV
        echo "CXXFLAGS=-std=c++17" >> $GITHUB_ENV
        llvm-config --version
    - name: Install dependencies
      run: |
        uv sync --upgrade --all-extras --all-groups --all-packages -p 3.13
    - name: Verify blint + disassembly dependencies
      run: |
        uv run python -c "import blint, nyxstone; print(blint.__file__)"
    - name: Clean up previous
      run: |
        rm -rf ${BLINT_DB_BOOTSTRAP_PATH}
    - name: Build and upload arm64 db
      run: |
        mkdir -p ${BLINT_DB_BOOTSTRAP_PATH}
        uv run blint-db --clean-start --disassemble --db-file ./blint.db build-meson
        uv run python .oras/orasclient.py -p meson-arm64
        uv run hf upload --quiet --repo-type dataset AppThreat/blint-db ./blint.db blintdb-meson-arm64/blint.db
        uv run hf upload --quiet --repo-type dataset AppThreat/blint-db ./blint.metadata.json blintdb-meson-arm64/blint.metadata.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}
        BLINT_DB_BOOTSTRAP_PATH: ${{ runner.temp }}/blint-db-temp
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
