name: Build and Upload vcpkg blint-db

on:
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appthreat/blintdb

jobs:
  builder-vcpkg:
    runs-on: ['self-hosted', 'ubuntu', 'amd64']
    timeout-minutes: 7200
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
    - name: Install LLVM 18 toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm-18 llvm-18-dev clang-18 lld-18 g++ pkg-config
        LLVM_CONFIG_BIN="$(command -v llvm-config || command -v llvm-config-18 || true)"
        if [ -z "$LLVM_CONFIG_BIN" ] && [ -x /usr/lib/llvm-18/bin/llvm-config ]; then
          LLVM_CONFIG_BIN=/usr/lib/llvm-18/bin/llvm-config
        fi
        if [ -z "$LLVM_CONFIG_BIN" ]; then
          echo "llvm-config not found after llvm-18 installation" >&2
          exit 1
        fi
        echo "$(dirname "$LLVM_CONFIG_BIN")" >> $GITHUB_PATH
        echo "NYXSTONE_LLVM_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
        echo "LLVM_CONFIG=$LLVM_CONFIG_BIN" >> $GITHUB_ENV
        echo "CC=clang-18" >> $GITHUB_ENV
        echo "CXX=clang++-18" >> $GITHUB_ENV
        echo "CXXFLAGS=-std=c++17" >> $GITHUB_ENV
        "$LLVM_CONFIG_BIN" --version
        curl -LO https://raw.githubusercontent.com/leleliu008/ppkg/master/ppkg
        chmod a+x ppkg
        mv ppkg /usr/local/bin/
        ppkg setup
    - name: Install dependencies
      run: |
        uv sync --upgrade --all-extras --all-groups --all-packages -p 3.13
    - name: Verify blint + disassembly dependencies
      run: |
        uv run python -c "import blint, nyxstone; print(blint.__file__)"
    - name: Clean up previous
      run: |
        rm -rf ${BLINT_DB_BOOTSTRAP_PATH}
    - name: Build and upload db
      run: |
        mkdir -p ${BLINT_DB_BOOTSTRAP_PATH}
        uv run blint-db --clean-start --disassemble --db-file ./blint.db build-vcpkg
        uv run python .oras/orasclient.py -p vcpkg
        uv run hf upload --quiet --repo-type dataset AppThreat/blint-db ./blint.db blintdb-vcpkg/blint.db
        uv run hf upload --quiet --repo-type dataset AppThreat/blint-db ./blint.metadata.json blintdb-vcpkg/blint.metadata.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}
        BLINT_DB_BOOTSTRAP_PATH: ${{ runner.temp }}/blint-db-temp
        VCPKG_DISABLE_METRICS: true
        HF_TOKEN: ${{ secrets.HF_TOKEN }}

  builder-arm64-vcpkg:
    runs-on: ['self-hosted', 'ubuntu', 'arm64']
    timeout-minutes: 7200
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
    - name: Install LLVM 18 toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm-18 llvm-18-dev clang-18 lld-18 g++ pkg-config
        LLVM_CONFIG_BIN="$(command -v llvm-config || command -v llvm-config-18 || true)"
        if [ -z "$LLVM_CONFIG_BIN" ] && [ -x /usr/lib/llvm-18/bin/llvm-config ]; then
          LLVM_CONFIG_BIN=/usr/lib/llvm-18/bin/llvm-config
        fi
        if [ -z "$LLVM_CONFIG_BIN" ]; then
          echo "llvm-config not found after llvm-18 installation" >&2
          exit 1
        fi
        echo "$(dirname "$LLVM_CONFIG_BIN")" >> $GITHUB_PATH
        echo "NYXSTONE_LLVM_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
        echo "LLVM_CONFIG=$LLVM_CONFIG_BIN" >> $GITHUB_ENV
        echo "CC=clang-18" >> $GITHUB_ENV
        echo "CXX=clang++-18" >> $GITHUB_ENV
        echo "CXXFLAGS=-std=c++17" >> $GITHUB_ENV
        "$LLVM_CONFIG_BIN" --version
    - name: Install dependencies
      run: |
        uv sync --upgrade --all-extras --all-groups --all-packages -p 3.13
    - name: Verify blint + disassembly dependencies
      run: |
        uv run python -c "import blint, nyxstone; print(blint.__file__)"
    - name: Clean up previous
      run: |
        rm -rf ${BLINT_DB_BOOTSTRAP_PATH}
    - name: Build and upload arm64 db
      run: |
        mkdir -p ${BLINT_DB_BOOTSTRAP_PATH}
        uv run blint-db --clean-start --disassemble --db-file ./blint.db build-vcpkg
        uv run python .oras/orasclient.py -p vcpkg-arm64
        uv run hf upload --quiet --repo-type dataset AppThreat/blint-db ./blint.db blintdb-vcpkg-arm64/blint.db
        uv run hf upload --quiet --repo-type dataset AppThreat/blint-db ./blint.metadata.json blintdb-vcpkg-arm64/blint.metadata.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}
        BLINT_DB_BOOTSTRAP_PATH: ${{ runner.temp }}/blint-db-temp
        VCPKG_DISABLE_METRICS: true
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
