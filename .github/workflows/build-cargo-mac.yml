name: Build and Upload cargo blint-db mac

on:
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appthreat/blintdb

jobs:
  builder-darwin-arm64-cargo:
    runs-on: ['self-hosted', 'macos-hosted', 'arm64']
    timeout-minutes: 7200
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
    - name: Ensure Rust toolchain
      run: |
        if ! command -v cargo >/dev/null 2>&1; then
          brew install rust
        fi
        cargo --version
        rustc --version
    - name: Install LLVM 18 toolchain
      run: |
        brew install llvm@18
        LLVM_PREFIX="$(brew --prefix llvm@18)"
        echo "/opt/homebrew/bin" >> $GITHUB_PATH
        echo "$LLVM_PREFIX/bin" >> $GITHUB_PATH
        echo "NYXSTONE_LLVM_PREFIX=$LLVM_PREFIX" >> $GITHUB_ENV
        echo "LLVM_CONFIG=$LLVM_PREFIX/bin/llvm-config" >> $GITHUB_ENV
        echo "CC=$LLVM_PREFIX/bin/clang" >> $GITHUB_ENV
        echo "CXX=$LLVM_PREFIX/bin/clang++" >> $GITHUB_ENV
        echo "CXXFLAGS=-std=c++17" >> $GITHUB_ENV
        echo "LDFLAGS=-L/opt/homebrew/lib -Wl,-rpath,/opt/homebrew/lib" >> $GITHUB_ENV
        "$LLVM_PREFIX/bin/llvm-config" --version
    - name: Install dependencies
      run: |
        uv sync --upgrade --all-extras --all-groups --all-packages -p 3.13
    - name: Verify blint + disassembly dependencies
      run: |
        uv run python -c "import blint, nyxstone; print(blint.__file__)"
    - name: Clean up previous
      run: |
        rm -rf ${BLINT_DB_BOOTSTRAP_PATH}
    - name: Build and upload darwin arm64 cargo db
      run: |
        mkdir -p ${BLINT_DB_BOOTSTRAP_PATH}
        uv run blint-db --clean-start --disassemble --db-file ./blint.db build-cargo
        uv run python .oras/orasclient.py -p cargo-darwin-arm64
        uv run hf upload --quiet --repo-type dataset AppThreat/blint-db ./blint.db blintdb-cargo-darwin-arm64/blint.db
        uv run hf upload --quiet --repo-type dataset AppThreat/blint-db ./blint.metadata.json blintdb-cargo-darwin-arm64/blint.metadata.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}
        BLINT_DB_BOOTSTRAP_PATH: ${{ runner.temp }}/blint-db-temp
        HF_TOKEN: ${{ secrets.HF_TOKEN }}

