name: Test - Build and Upload conan blint-db

on:
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appthreat/blintdb

jobs:
  builder-conan-linux-tst:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
    - name: Install LLVM 18 toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm-18 llvm-18-dev clang-18 lld-18 g++ pkg-config build-essential ninja-build cmake
        LLVM_CONFIG_BIN="$(command -v llvm-config || command -v llvm-config-18 || true)"
        if [ -z "$LLVM_CONFIG_BIN" ] && [ -x /usr/lib/llvm-18/bin/llvm-config ]; then
          LLVM_CONFIG_BIN=/usr/lib/llvm-18/bin/llvm-config
        fi
        if [ -z "$LLVM_CONFIG_BIN" ]; then
          echo "llvm-config not found after llvm-18 installation" >&2
          exit 1
        fi
        echo "$(dirname "$LLVM_CONFIG_BIN")" >> $GITHUB_PATH
        echo "NYXSTONE_LLVM_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
        echo "LLVM_CONFIG=$LLVM_CONFIG_BIN" >> $GITHUB_ENV
        echo "CC=clang-18" >> $GITHUB_ENV
        echo "CXX=clang++-18" >> $GITHUB_ENV
        echo "CXXFLAGS=-std=c++17" >> $GITHUB_ENV
        "$LLVM_CONFIG_BIN" --version
    - name: Install dependencies
      run: |
        uv sync --upgrade --all-extras --all-groups --all-packages -p 3.13
    - name: Verify blint + conan + disassembly dependencies
      run: |
        uv run python -c "import blint, nyxstone, conan; print(blint.__file__)"
    - name: Clean up previous
      run: |
        rm -rf ${BLINT_DB_BOOTSTRAP_PATH}
    - name: Build and upload Linux conan test db
      run: |
        mkdir -p ${BLINT_DB_BOOTSTRAP_PATH}
        uv run blint-db --clean-start --disassemble --db-file ./blint.db -f build-conan
        uv run python .oras/orasclient.py -p conan-linux-tst
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}
        BLINT_DB_BOOTSTRAP_PATH: ${{ runner.temp }}/blint-db-temp
        BLINT_DB_CONAN_FEW_PACKAGES: 4
        BLINT_DB_CONAN_REMOTE: conancenter

  builder-conan-macos-tst:
    runs-on: macos-14
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        persist-credentials: false
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
    - name: Install LLVM 18 toolchain
      run: |
        brew install llvm@18 cmake ninja
        LLVM_PREFIX="$(brew --prefix llvm@18)"
        echo "/opt/homebrew/bin" >> $GITHUB_PATH
        echo "$LLVM_PREFIX/bin" >> $GITHUB_PATH
        echo "NYXSTONE_LLVM_PREFIX=$LLVM_PREFIX" >> $GITHUB_ENV
        echo "LLVM_CONFIG=$LLVM_PREFIX/bin/llvm-config" >> $GITHUB_ENV
        echo "CC=$LLVM_PREFIX/bin/clang" >> $GITHUB_ENV
        echo "CXX=$LLVM_PREFIX/bin/clang++" >> $GITHUB_ENV
        echo "CXXFLAGS=-std=c++17" >> $GITHUB_ENV
        echo "LDFLAGS=-L/opt/homebrew/lib -Wl,-rpath,/opt/homebrew/lib" >> $GITHUB_ENV
        "$LLVM_PREFIX/bin/llvm-config" --version
    - name: Install dependencies
      run: |
        uv sync --upgrade --all-extras --all-groups --all-packages -p 3.13
    - name: Verify blint + conan + disassembly dependencies
      run: |
        uv run python -c "import blint, nyxstone, conan; print(blint.__file__)"
    - name: Clean up previous
      run: |
        rm -rf ${BLINT_DB_BOOTSTRAP_PATH}
    - name: Build and upload macOS conan test db
      run: |
        mkdir -p ${BLINT_DB_BOOTSTRAP_PATH}
        uv run blint-db --clean-start --disassemble --db-file ./blint.db -f build-conan
        uv run python .oras/orasclient.py -p conan-macos-tst
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}
        BLINT_DB_BOOTSTRAP_PATH: ${{ runner.temp }}/blint-db-temp
        BLINT_DB_CONAN_FEW_PACKAGES: 4
        BLINT_DB_CONAN_REMOTE: conancenter
